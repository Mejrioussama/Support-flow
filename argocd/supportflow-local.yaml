apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: supportflow-local
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Mejrioussama/Support-flow.git
    targetRevision: main
    path: k8s/overlays/local
  destination:
    server: https://kubernetes.default.svc
    namespace: supportflow
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
