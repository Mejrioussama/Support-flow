# ===============================================
# SupportFlow - Kubernetes Profile Configuration
# ===============================================

server:
  port: 8080

spring:
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8180/realms/supportflow}
          jwk-set-uri: ${KEYCLOAK_JWK_URI:http://host.docker.internal:8180/realms/supportflow/protocol/openid-connect/certs}

management:
  health:
    camunda:
      enabled: false
    mail:
      enabled: false
  endpoint:
    health:
      show-details: always
