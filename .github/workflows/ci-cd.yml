name: SupportFlow CI/CD GitOps

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  security-events: write

env:
  JAVA_VERSION: '17'
  NODE_VERSION: '18'
  REGISTRY: ghcr.io
  IMAGE_NAMESPACE: ghcr.io/${{ github.repository_owner }}
  BACKEND_IMAGE: ghcr.io/${{ github.repository_owner }}/supportflow-backend
  FRONTEND_IMAGE: ghcr.io/${{ github.repository_owner }}/supportflow-frontend
  K8S_ENV: ${{ github.ref == 'refs/heads/main' && 'prod' || 'staging' }}

jobs:
  remote-readiness:
    name: Remote GitOps Readiness
    runs-on: ubuntu-latest
    steps:
      - name: Skip remote secret validation on pull request
        if: github.event_name == 'pull_request'
        run: echo "Pull request run - remote secret validation skipped." >> "$GITHUB_STEP_SUMMARY"
      - name: Validate required remote secrets
        if: github.event_name != 'pull_request'
        shell: bash
        run: |
          missing=()
          [[ -n "${{ secrets.SONAR_TOKEN }}" ]] || missing+=("SONAR_TOKEN")
          [[ -n "${{ secrets.SONAR_HOST_URL }}" ]] || missing+=("SONAR_HOST_URL")
          [[ -n "${{ secrets.ARGOCD_SERVER }}" ]] || missing+=("ARGOCD_SERVER")
          [[ -n "${{ secrets.ARGOCD_AUTH_TOKEN }}" ]] || missing+=("ARGOCD_AUTH_TOKEN")

          if [ ${#missing[@]} -gt 0 ]; then
            echo "Remote GitOps readiness failed." >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "Missing secrets:" >> "$GITHUB_STEP_SUMMARY"
            for item in "${missing[@]}"; do
              echo "- $item" >> "$GITHUB_STEP_SUMMARY"
            done
            exit 1
          fi

          echo "All required remote secrets are configured." >> "$GITHUB_STEP_SUMMARY"

      - name: Validate ArgoCD repo source is real
        if: github.event_name != 'pull_request'
        shell: bash
        run: |
          if grep -R "https://github.com/example/support-flow.git" argocd >/dev/null 2>&1; then
            echo "ArgoCD manifests still point to the example repository." >> "$GITHUB_STEP_SUMMARY"
            echo "Run scripts/configure-remote-gitops.ps1 with the real GitHub repo URL before pushing." >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi

  backend-build:
    name: Build Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven
      - name: Maven verify
        run: mvn clean verify -DskipTests=false

  frontend-build:
    name: Build Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Build production
        run: npm run build -- --configuration=production

  code-quality:
    name: SonarQube Analysis
    runs-on: ubuntu-latest
    needs: [backend-build, frontend-build, remote-readiness]
    if: github.event_name != 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm ci
      - name: Backend SonarQube
        working-directory: ./backend
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        run: >
          mvn clean verify sonar:sonar
          -Dsonar.projectKey=supportflow-backend
          -Dsonar.host.url=$SONAR_HOST_URL
          -Dsonar.login=$SONAR_TOKEN
      - name: Frontend SonarQube
        working-directory: ./frontend
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
        run: >
          npx sonar-scanner
          -Dsonar.projectKey=supportflow-frontend
          -Dsonar.sources=src
          -Dsonar.host.url=$SONAR_HOST_URL
          -Dsonar.login=$SONAR_TOKEN

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: [backend-build, frontend-build]
    steps:
      - uses: actions/checkout@v4
      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-results.sarif
      - uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif

  docker-build:
    name: Build and Push Images
    runs-on: ubuntu-latest
    needs: [backend-build, frontend-build, remote-readiness]
    if: github.event_name != 'pull_request'
    outputs:
      image_tag: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.BACKEND_IMAGE }}
            ${{ env.FRONTEND_IMAGE }}
          tags: |
            type=sha
            type=ref,event=branch
      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:sha-${{ github.sha }}
            ${{ env.BACKEND_IMAGE }}:${{ env.K8S_ENV }}
      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:sha-${{ github.sha }}
            ${{ env.FRONTEND_IMAGE }}:${{ env.K8S_ENV }}

  update-gitops-manifests:
    name: Update GitOps Manifests
    runs-on: ubuntu-latest
    needs: docker-build
    if: github.event_name != 'pull_request'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
      - name: Update backend image tag
        run: |
          sed -i "s#image: ghcr.io/.*/supportflow-backend:.*#image: ${{ env.BACKEND_IMAGE }}:sha-${{ github.sha }}#g" k8s/overlays/${{ env.K8S_ENV }}/backend-patch.yaml
      - name: Update frontend image tag
        run: |
          sed -i "s#image: ghcr.io/.*/supportflow-frontend:.*#image: ${{ env.FRONTEND_IMAGE }}:sha-${{ github.sha }}#g" k8s/overlays/${{ env.K8S_ENV }}/frontend-patch.yaml
      - name: Commit manifest changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add k8s/overlays/${{ env.K8S_ENV }}/backend-patch.yaml k8s/overlays/${{ env.K8S_ENV }}/frontend-patch.yaml
          git diff --cached --quiet || git commit -m "ci: update ${K8S_ENV} manifests for ${GITHUB_SHA}"
          git push

  argocd-sync:
    name: Sync ArgoCD
    runs-on: ubuntu-latest
    needs: update-gitops-manifests
    if: github.event_name != 'pull_request'
    steps:
      - name: Trigger ArgoCD sync
        env:
          ARGOCD_SERVER: ${{ secrets.ARGOCD_SERVER }}
          ARGOCD_AUTH_TOKEN: ${{ secrets.ARGOCD_AUTH_TOKEN }}
        run: |
          curl -sS -X POST "${ARGOCD_SERVER}/api/v1/applications/supportflow-${{ env.K8S_ENV }}/sync" \
            -H "Authorization: Bearer ${ARGOCD_AUTH_TOKEN}" \
            -H "Content-Type: application/json" \
            -d '{"prune": true, "dryRun": false, "strategy": {"hook": {"force": true}}}'
