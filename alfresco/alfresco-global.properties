#
# SupportFlow Alfresco repository configuration
#

dir.root=/usr/local/tomcat/alf_data
dir.keystore=${dir.root}/keystore

# PostgreSQL datasource
db.driver=org.postgresql.Driver
db.username=alfresco
db.password=alfresco
db.name=alfresco
db.url=jdbc:postgresql://alfresco-postgres:5432/alfresco
hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Public endpoints used by Share
alfresco.host=localhost
alfresco.port=8090
alfresco.protocol=http
share.host=localhost
share.port=8091
share.protocol=http

# Reduce bootstrap overhead for dev profile
index.subsystem.name=noindex

# CMIS - require for external archival
cifs.enabled=false

# Disable complex encryption for development - use simple file store
encryption.keystore.type=JCEKS
encryption.cipherAlgorithm=AES/CBC/PKCS5Padding
encryption.keyAlgorithm=AES
encryption.keystore.create=true
encryption.keystore.location=${dir.keystore}/keystore
encryption.keystore.keyMetaData.location=${dir.keystore}/keystore-passwords.properties

# Minimal bootstrap - disable unnecessary subsystems
synchronization.import.enabled=true
synchronization.synchronizeChangesOnly=true
