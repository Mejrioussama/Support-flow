apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: supportflow
  namespace: supportflow
  annotations:
    kubernetes.io/ingress.class: public
spec:
  rules:
    - host: supportflow.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: supportflow-frontend
                port:
                  number: 80
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: supportflow-backend
                port:
                  number: 8080
