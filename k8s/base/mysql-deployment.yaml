apiVersion: apps/v1
kind: Deployment
metadata:
  name: supportflow-mysql
  namespace: supportflow
spec:
  replicas: 1
  selector:
    matchLabels:
      app: supportflow-mysql
  template:
    metadata:
      labels:
        app: supportflow-mysql
    spec:
      containers:
        - name: mysql
          image: mysql:8.0
          ports:
            - containerPort: 3306
          env:
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: supportflow-secrets
                  key: MYSQL_ROOT_PASSWORD
            - name: MYSQL_DATABASE
              value: supportflow_db
            - name: MYSQL_USER
              valueFrom:
                secretKeyRef:
                  name: supportflow-secrets
                  key: DB_USERNAME
            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: supportflow-secrets
                  key: DB_PASSWORD
          volumeMounts:
            - name: mysql-data
              mountPath: /var/lib/mysql
      volumes:
        - name: mysql-data
          persistentVolumeClaim:
            claimName: mysql-data
