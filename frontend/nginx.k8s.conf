server {
    listen 80;
    listen [::]:80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types
        text/plain text/css text/xml text/javascript
        application/json application/javascript application/xml
        application/wasm image/svg+xml font/woff2;

    proxy_buffer_size          16k;
    proxy_buffers              8 32k;
    proxy_busy_buffers_size    64k;

    add_header X-Content-Type-Options   "nosniff"          always;
    add_header X-Frame-Options          "SAMEORIGIN"       always;
    add_header X-XSS-Protection         "1; mode=block"    always;
    add_header Referrer-Policy          "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy       "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy
        "default-src 'self';
         script-src  'self' 'unsafe-inline' 'unsafe-eval';
         style-src   'self' 'unsafe-inline' https://fonts.googleapis.com;
         font-src    'self' https://fonts.gstatic.com;
         img-src     'self' data: blob:;
         connect-src 'self' ws: wss: http://localhost:8180 http://localhost:8088 http://localhost:8080;
         worker-src  'self' blob:"
        always;

    location /api/ws {
        proxy_pass http://supportflow-backend:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host       $host;
        proxy_set_header X-Real-IP  $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout  3600s;
        proxy_send_timeout  3600s;
    }

    location /api/ {
        proxy_pass http://supportflow-backend:8080;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization     $http_authorization;
        proxy_read_timeout    300s;
        proxy_connect_timeout 30s;
        proxy_send_timeout    300s;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma  "no-cache";
        add_header Expires "0";
    }

    location ~* \.(?:js|css|woff2?|ttf|otf|eot)$ {
        try_files $uri =404;
        access_log off;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location ~* \.(?:png|jpg|jpeg|gif|svg|ico|webp)$ {
        try_files $uri =404;
        access_log off;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    location ~* \.wasm$ {
        try_files $uri =404;
        access_log off;
        expires 30d;
        add_header Cache-Control "public, immutable";
        add_header Content-Type  "application/wasm";
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
        internal;
    }
}
